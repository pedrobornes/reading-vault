spring.application.name=readingvault
# 1. Configuración de la Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/reading_vault?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=toor
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración de JPA / Hibernate
# 'update' para crear las tablas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Sentencias SQL por consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

